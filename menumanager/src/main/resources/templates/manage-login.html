<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manager Portal - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body class="auth-page d-flex align-items-center justify-content-center py-5">

    <div class="card auth-card shadow-lg w-100 mx-3">
        <div class="card-body p-4 p-md-5">
            <div class="text-center mb-4">
                <i class="bi bi-shop text-primary" style="font-size: 2.5rem;"></i>
                <h3 class="fw-bold mt-2 mb-1">Manager Portal</h3>
                <p class="text-muted small mb-0">Sign in or register your organization</p>
            </div>

            <div th:if="${success}" class="alert alert-success py-2" th:text="${success}"></div>
            <div th:if="${error}" class="alert alert-danger py-2" th:text="${error}"></div>

            <ul class="nav nav-pills nav-fill mb-4" role="tablist">
                <li class="nav-item">
                    <button class="nav-link fw-bold" th:classappend="${activeTab != 'register'} ? ' active' : ''"
                            data-bs-toggle="pill" data-bs-target="#login-panel" type="button">Login</button>
                </li>
                <li class="nav-item">
                    <button class="nav-link fw-bold" th:classappend="${activeTab == 'register'} ? ' active' : ''"
                            data-bs-toggle="pill" data-bs-target="#register-panel" type="button">Register</button>
                </li>
            </ul>

            <div class="tab-content">
                <div class="tab-pane fade" th:classappend="${activeTab != 'register'} ? ' show active' : ''" id="login-panel">
                    <form action="/manage/login" method="post">
                        <div class="mb-3">
                            <label class="form-label fw-bold small">Organization or branch name</label>
                            <input type="text" class="form-control" name="accountName" required
                                   placeholder="Enter organization or branch name"
                                   th:value="${accountName}">
                            <div class="form-text">General managers use the organization name; branch managers use the branch name.</div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold small">Password</label>
                            <input type="password" class="form-control" name="password" required minlength="4"
                                   autocomplete="current-password">
                        </div>
                        <button type="submit" class="btn btn-primary w-100 fw-bold">
                            <i class="bi bi-box-arrow-in-right me-1"></i> Sign in
                        </button>
                        <div class="text-center mt-3">
                            <a href="/manage/forgot-password" class="small text-decoration-none">Forgot password?</a>
                        </div>
                    </form>
                </div>

                <div class="tab-pane fade" th:classappend="${activeTab == 'register'} ? ' show active' : ''" id="register-panel">
                    <form action="/manage/register" method="post" id="registerForm">
                        <div class="mb-3">
                            <label class="form-label fw-bold small">Organization Name</label>
                            <input type="text" class="form-control" name="organizationName" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold small">Email</label>
                            <input type="email" class="form-control" name="email" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold small">Password</label>
                            <input type="password" class="form-control" name="password" id="regPassword" required minlength="6"
                                   autocomplete="new-password">
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold small">Confirm password</label>
                            <input type="password" class="form-control" name="confirmPassword" id="regConfirmPassword" required minlength="6"
                                   autocomplete="new-password">
                        </div>
                        <p class="text-muted small mb-3">
                            After you register, we will email you a 6-digit code to verify your address.
                        </p>
                        <button type="submit" class="btn btn-success w-100 fw-bold">
                            <i class="bi bi-person-plus me-1"></i> Register &amp; send code
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/login.js"></script>
</body>
</html>
