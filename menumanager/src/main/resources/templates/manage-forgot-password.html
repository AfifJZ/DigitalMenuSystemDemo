<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body class="auth-page d-flex align-items-center justify-content-center py-5">

    <div class="card auth-card shadow-lg w-100 mx-3">
        <div class="card-body p-4 p-md-5">
            <div class="text-center mb-4">
                <i class="bi bi-key text-primary" style="font-size: 2.5rem;"></i>
                <h3 class="fw-bold mt-2 mb-1">Reset password</h3>
                <p class="text-muted small mb-0" th:unless="${verificationSent}">Enter your details to receive a verification code</p>
                <p class="text-muted small mb-0" th:if="${verificationSent}">Enter the verification code we sent to your email</p>
            </div>

            <div th:if="${error}" class="alert alert-danger py-2" th:text="${error}"></div>
            <div th:if="${verificationSent}" class="alert alert-info py-2">
                <i class="bi bi-info-circle me-1"></i>
                A 6-digit verification code has been sent to your registered email.
            </div>
            <!-- Simplified: Direct reset form (no OTP) -->
            <form action="/manage/forgot-password" method="post">
                <div class="mb-3">
                    <label class="form-label fw-bold small">Reset password for</label>
                    <select class="form-select" name="resetType" id="resetType" onchange="window.updateForgotFields()">
                        <option value="organization" th:selected="${resetType == null or resetType != 'branch'}">Organization (general manager)</option>
                        <option value="branch" th:selected="${resetType == 'branch'}">Branch manager</option>
                    </select>
                </div>

                <div class="mb-3" id="orgNameField">
                    <label class="form-label fw-bold small">Organization name</label>
                    <input type="text" class="form-control" name="organizationName" id="organizationName"
                           th:value="${organizationName}" placeholder="Your organization">
                </div>

                <div class="mb-3 d-none" id="branchNameField">
                    <label class="form-label fw-bold small">Branch name</label>
                    <input type="text" class="form-control" name="branchName" id="branchName"
                           th:value="${branchName}" placeholder="Branch name">
                </div>

                <div class="mb-3">
                    <label class="form-label fw-bold small">Registered email</label>
                    <input type="email" class="form-control" name="email" th:value="${email}" required>
                    <div class="form-text">Must match the email used when the account was registered.</div>
                </div>

                <button type="submit" class="btn btn-primary w-100 fw-bold mb-2">Reset Password</button>
                <a href="/manage/login" class="btn btn-link w-100">Back to sign in</a>
            </form>
            
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/forgot-password.js"></script>
</body>
</html>
