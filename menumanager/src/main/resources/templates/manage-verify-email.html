<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify Email</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body class="auth-page d-flex align-items-center justify-content-center py-5">

    <div class="card auth-card shadow-lg w-100 mx-3">
        <div class="card-body p-4 p-md-5">
            <div class="text-center mb-4">
                <i class="bi bi-envelope-check text-primary" style="font-size: 2.5rem;"></i>
                <h3 class="fw-bold mt-2 mb-1">Verify your email</h3>
                <p class="text-muted small mb-0">
                    We sent a 6-digit code to <strong th:text="${email}">you@example.com</strong>
                </p>
            </div>

            <div th:if="${error}" class="alert alert-danger py-2" th:text="${error}"></div>
            <div th:if="${success}" class="alert alert-success py-2" th:text="${success}"></div>

            <div th:if="${devMode}" class="alert alert-warning py-2 small">
                <i class="bi bi-terminal me-1"></i>
                <strong>Dev mode:</strong> Email is not configured yet. Look at the
                <strong>terminal/console</strong> where you ran the app — the OTP code is printed there.
            </div>

            <form action="/manage/verify-email" method="post" class="mb-3">
                <div class="mb-3">
                    <label class="form-label fw-bold small">Verification code</label>
                    <input type="text" class="form-control otp-input" name="code"
                           placeholder="000000" maxlength="6" pattern="[0-9]{6}" required autofocus>
                    <div class="form-text">Enter the 6-digit code. It expires in 15 minutes.</div>
                </div>
                <button type="submit" class="btn btn-success w-100 fw-bold">
                    <i class="bi bi-check-circle me-1"></i> Verify &amp; create account
                </button>
            </form>

            <form action="/manage/verify-email/resend" method="post" class="mb-2">
                <button type="submit" class="btn btn-outline-secondary w-100 btn-sm">Resend code</button>
            </form>

            <a href="/manage/login" class="btn btn-link w-100 small">Back to sign in</a>
        </div>
    </div>
</body>
</html>
