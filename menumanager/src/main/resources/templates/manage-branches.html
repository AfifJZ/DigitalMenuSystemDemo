<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Branches</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body class="bg-light">

    <div th:replace="~{fragments/admin-navbar :: adminNav('branches')}"></div>
    <div th:replace="~{fragments/admin-branch-bar :: branchBar}"></div>

    <div class="container my-4">
        <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center gap-3 mb-4">
            <div>
                <h3 class="fw-bold mb-1"><i class="bi bi-building text-primary me-2"></i>Branches</h3>
                <p class="text-muted mb-0 small">Manage location, tables, QR codes, and branch login passwords.</p>
            </div>
            <div>
                <a href="/manage/setup" class="btn btn-primary fw-bold">
                    <i class="bi bi-plus-lg me-1"></i>Add branch
                </a>
            </div>
        </div>

        <div class="row g-4" th:if="${!branches.isEmpty()}">
            <div class="col-12 col-md-6 col-lg-4" th:each="b : ${branches}">
                <div class="card shadow-sm border-0 h-100">
                    <div class="card-body">
                        <h5 class="fw-bold" th:text="${b.name}">Branch</h5>
                        <p class="text-muted small mb-2"><i class="bi bi-geo-alt me-1"></i><span th:text="${b.location}">Location</span></p>
                        <div class="d-flex align-items-center gap-2">
                            <span class="badge bg-secondary-subtle text-secondary" th:id="'tableCount-' + ${b.id}" th:text="${b.tableCount} + ' tables'">0 tables</span>
                            <button type="button" class="btn btn-sm btn-outline-secondary" th:data-branch-id="${b.id}" th:data-tables="${b.tableCount}"
                                    onclick="window.editTableCount(this)">
                                <i class="bi bi-pencil"></i>
                            </button>
                        </div>
                    </div>
                    <div class="card-footer bg-white border-0 pt-0">
                        <a th:href="@{/manage/branch/{id}(id=${b.id})}" class="btn btn-outline-primary btn-sm w-100 fw-bold">
                            <i class="bi bi-sliders me-1"></i>View details
                        </a>
                    </div>
                </div>
            </div>
        </div>

        <div th:if="${branches.isEmpty()}" class="text-center py-5 text-muted">
            <i class="bi bi-building fs-1"></i>
            <p class="mt-3 mb-0">No branches configured yet.</p>
            <a href="/manage/setup" class="btn btn-primary mt-3">Set up first branch</a>
        </div>
    </div>

    <!-- Modal for editing table count -->
    <div class="modal fade" id="editTableModal" tabindex="-1" aria-labelledby="editTableModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="editTableModalLabel">Edit table count</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <form id="tableCountForm" method="post">
                    <div class="modal-body">
                        <div class="mb-3">
                            <label for="newTableCount" class="form-label fw-bold">Number of tables</label>
                            <input type="number" class="form-control" id="newTableCount" min="1" max="500" required>
                            <small class="form-text text-muted">Updating this changes how many table QR codes are generated.</small>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                        <button type="submit" class="btn btn-primary fw-bold">
                            <i class="bi bi-check-lg me-1"></i>Save changes
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/branches.js"></script>
</body>
</html>
