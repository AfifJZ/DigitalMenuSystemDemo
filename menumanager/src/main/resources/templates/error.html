<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Something went wrong</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body class="bg-light">
<div class="container my-5">
    <div class="row justify-content-center">
        <div class="col-12 col-md-10 col-lg-8">
            <div class="card shadow-sm border-0">
                <div class="card-body p-4 text-center">
                    <i class="bi bi-exclamation-triangle-fill text-warning" style="font-size: 3rem;"></i>
                    <h3 class="fw-bold mt-3">Something went wrong</h3>
                    <p class="text-muted">
                        We hit an unexpected error while loading this page. The detail is below.
                    </p>
                    <p class="text-secondary small mb-3">
                        <span class="fw-bold" th:text="${status}">500</span>
                        <span class="mx-2">·</span>
                        <span th:text="${error}">Internal Server Error</span>
                    </p>

                    <!-- Exception class + message, BIG and obvious -->
                    <div th:if="${exception != null}" class="alert alert-danger text-start mt-3 mb-3" role="alert">
                        <div class="fw-bold mb-1">
                            <i class="bi bi-bug me-1"></i>
                            <span th:text="${exception}">ExceptionClass</span>
                        </div>
                        <div th:if="${message != null}" class="font-monospace small text-break" th:text="${message}">
                            message
                        </div>
                    </div>

                    <div class="d-flex gap-2 justify-content-center">
                        <a href="/customer" class="btn btn-primary fw-bold">
                            <i class="bi bi-house me-1"></i>Go to menu
                        </a>
                        <a href="javascript:location.reload()" class="btn btn-outline-secondary fw-bold">
                            <i class="bi bi-arrow-clockwise me-1"></i>Reload
                        </a>
                    </div>

                    <p class="text-muted small mt-4 mb-0">
                        The full stack trace is in the application log.
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
