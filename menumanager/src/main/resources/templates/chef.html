<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chef Display - Kitchen Orders</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" th:href="@{/css/app.css}">
    <style>
        body { background: #1a1a2e; color: #eee; font-family: 'Segoe UI', system-ui, sans-serif; }
        .chef-header { background: #16213e; border-bottom: 3px solid #e94560; padding: 20px 0; }
        .chef-header h1 { color: #fff; font-size: 2rem; font-weight: 800; }
        .chef-header .badge { font-size: 1.1rem; padding: 8px 16px; }
        .chef-card { background: #16213e; border: none; border-radius: 16px; box-shadow: 0 8px 32px rgba(0,0,0,0.3); transition: transform 0.2s; }
        .chef-card:hover { transform: translateY(-2px); }
        .chef-card .card-header { background: #0f3460; border-bottom: 2px solid #e94560; border-radius: 16px 16px 0 0 !important; padding: 16px 20px; }
        .chef-card .card-header .order-num { font-size: 1.5rem; font-weight: 800; color: #fff; }
        .chef-card .card-body { padding: 16px 20px; }
        .chef-item { padding: 8px 0; border-bottom: 1px solid #1a1a2e; display: flex; align-items: flex-start; gap: 12px; }
        .chef-item:last-child { border-bottom: none; }
        .chef-item .item-name { font-size: 1.2rem; font-weight: 700; color: #fff; }
        .chef-item .item-qty { font-size: 1.3rem; font-weight: 800; color: #e94560; min-width: 40px; text-align: center; }
        .chef-item .item-note { font-size: 0.95rem; color: #f5c518; margin-top: 4px; }
        .queue-count { font-size: 2.5rem; font-weight: 900; color: #e94560; }
        .empty-state { text-align: center; padding: 80px 20px; }
        .empty-state i { font-size: 5rem; color: #0f3460; }
        .empty-state h3 { color: #888; margin-top: 20px; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
        .live-indicator { animation: pulse 2s infinite; display: inline-block; width: 10px; height: 10px; background: #4ade80; border-radius: 50%; margin-right: 8px; }
    </style>
</head>
<body>
    <div class="chef-header">
        <div class="container-fluid px-4">
            <div class="d-flex justify-content-between align-items-center">
                <div>
                    <h1><i class="bi bi-fire text-danger me-2"></i>Chef Display</h1>
                    <div class="text-muted small">
                        <span class="live-indicator"></span>
                        <span>Live — auto-updates every 15 seconds</span>
                    </div>
                </div>
                <div class="text-end">
                    <div class="queue-count" th:text="${queueCount}">0</div>
                    <div class="text-muted small">active orders</div>
                </div>
            </div>
        </div>
    </div>

    <div class="container-fluid my-4 px-4" id="ordersContainer">
        <div class="row row-cols-1 row-cols-md-2 row-cols-xl-3 row-cols-xxl-4 g-4" th:if="${!#lists.isEmpty(orders)}">
            <div class="col" th:each="order : ${orders}">
                <div class="card chef-card h-100">
                    <div class="card-header d-flex justify-content-between align-items-center">
                        <div>
                            <span class="order-num">#<span th:text="${order.id}">1</span></span>
                            <span class="badge bg-warning text-dark ms-2">
                                <i class="bi bi-grid-3x3-gap me-1"></i>Table <span th:text="${order.tableNumber != null ? order.tableNumber : '-'}">0</span>
                            </span>
                        </div>
                        <span class="text-muted small"><i class="bi bi-clock me-1"></i><span th:text="${#temporals.format(order.orderTime, 'HH:mm')}">12:00</span></span>
                    </div>
                    <div class="card-body">
                        <div th:each="item : ${orderItemsMap[order.id]}" class="chef-item">
                            <span class="item-qty">x<span th:text="${item.quantity}">1</span></span>
                            <div>
                                <div class="item-name" th:text="${item.name}">Item</div>
                                <div th:if="${item.note != null and !item.note.isEmpty()}" class="item-note">
                                    <i class="bi bi-chat-left-text me-1"></i><span th:text="${item.note}">Note</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <div class="empty-state" th:unless="${!#lists.isEmpty(orders)}">
            <i class="bi bi-cup-hot"></i>
            <h3>All caught up, chef!</h3>
            <p class="text-muted">No active orders at the moment.</p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/chef.js"></script>
</body>
</html>
