<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table QR Codes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body class="bg-light">

    <div th:replace="~{fragments/admin-navbar :: adminNav('qr')}"></div>

    <div class="container my-4">
        <div class="d-flex justify-content-start mb-3 no-print">
            <button type="button" class="btn btn-primary fw-bold" onclick="window.print()">
                <i class="bi bi-printer me-1"></i>Print QR Codes
            </button>
        </div>

        <div class="text-center mb-4 no-print">
            <h3 class="fw-bold mb-1" th:text="${branch.name}">Branch</h3>
            <p class="text-muted mb-0" th:text="${branch.location}">Location</p>
            <p class="small text-secondary mt-2">
                Scan each QR code to open the menu for that table (Tables 1–<span th:text="${tableCount}">10</span>).
            </p>
        </div>

        <div class="row row-cols-2 row-cols-sm-3 row-cols-md-4 row-cols-lg-5 g-4 justify-content-center">
            <div class="col qr-card" th:each="t : ${#numbers.sequence(1, tableCount)}">
                <div class="card shadow-sm border-0 h-100 text-center">
                    <div class="card-body p-3">
                        <h5 class="fw-bold text-primary mb-3">Table <span th:text="${t}">1</span></h5>
                        <img th:src="@{/manage/qr/{branchId}/image(branchId=${branch.id}, table=${t})}"
                             th:alt="'QR code for table ' + ${t}"
                             class="img-fluid border rounded">
                        <p class="small text-muted mt-2 mb-0 text-break"
                           th:text="${customerUrls[t]}">URL</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
