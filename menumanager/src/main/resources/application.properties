spring.application.name=menumanager
server.port=8080

# MySQL (XAMPP)
spring.datasource.url=jdbc:mysql://localhost:3306/digital_menu_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Stripe (test mode) — cards + FPX online banking (Malaysia)
# Enable FPX: Stripe Dashboard → Settings → Payment methods → FPX
stripe.secretKey=PUT_YOUR_STRIPE_SECRET_KEY_HERE
stripe.webhookSecret=PUT_YOUR_WEBHOOK_SECRET_HERE
app.publicBaseUrl=http://localhost:8080
app.payment.stripe-min-amount-myr=2.00
# Auto-register Profile bank with Stripe Connect.
# Set to FALSE to skip the Stripe Connect call and only save the bank
# details locally (useful for local demos when the MY-platform
# destination-account rule is blocking registration). Switch back to
# TRUE (and enable Connect in your Stripe Dashboard) for production.
app.stripe.connect.enabled=false

# =============================================================================
# OTP EMAIL — Gmail (sender mailbox; users still type their own email when registering)
# =============================================================================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=afif2429@gmail.com
spring.mail.password=PUT_YOUR_GMAIL_APP_PASSWORD_HERE
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

app.mail.from=afif2429@gmail.com
app.mail.console-fallback=true
