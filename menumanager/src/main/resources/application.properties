spring.application.name=menumanager
server.port=${PORT:8080}

# Reload Thymeleaf templates on change during local development
spring.thymeleaf.cache=false

# MySQL — local dev uses XAMPP defaults; Railway overrides via env vars
spring.datasource.url=${MYSQL_URL:${DB_URL:jdbc:mysql://localhost:3306/digital_menu_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}}
spring.datasource.username=${MYSQL_USER:${MYSQLUSER:${DB_USERNAME:root}}}
spring.datasource.password=${MYSQL_PASSWORD:${MYSQLPASSWORD:${DB_PASSWORD:}}}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=${JPA_SHOW_SQL:true}
spring.jpa.properties.hibernate.format_sql=${JPA_FORMAT_SQL:true}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Stripe (test mode) — cards + FPX online banking (Malaysia)
# Enable FPX: Stripe Dashboard → Settings → Payment methods → FPX
# For production, override these via environment variables (STRIPE_SECRET_KEY, STRIPE_WEBHOOK_SECRET, PUBLIC_BASE_URL)
stripe.secretKey=${STRIPE_SECRET_KEY:}
stripe.webhookSecret=${STRIPE_WEBHOOK_SECRET:}
app.publicBaseUrl=${PUBLIC_BASE_URL:http://localhost:8080}
app.payment.stripe-min-amount-myr=${STRIPE_MIN_AMOUNT_MYR:2.00}
# Auto-register Profile bank with Stripe Connect.
# Set to FALSE to skip the Stripe Connect call and only save the bank
# details locally (useful for local demos when the MY-platform
# destination-account rule is blocking registration). Switch back to
# TRUE (and enable Connect in your Stripe Dashboard) for production.
app.stripe.connect.enabled=${STRIPE_CONNECT_ENABLED:false}

# =============================================================================
# OTP EMAIL — Mailgun API settings
# =============================================================================
# Use Mailgun API credentials via environment variables.
# For Mailgun sandbox use these values in Railway:
#   MAILGUN_DOMAIN=sandbox269e1414295f4ff6aaf977fb5417036e.mailgun.org
#   MAILGUN_API_KEY=<your-Mailgun-API-Key>
#   MAIL_FROM=postmaster@sandbox269e1414295f4ff6aaf977fb5417036e.mailgun.org
mailgun.api-key=${MAILGUN_API_KEY:}
mailgun.domain=${MAILGUN_DOMAIN:sandbox269e1414295f4ff6aaf977fb5417036e.mailgun.org}
mailgun.api-base-url=${MAILGUN_API_BASE_URL:https://api.mailgun.net}
app.mail.from=${MAIL_FROM:postmaster@sandbox269e1414295f4ff6aaf977fb5417036e.mailgun.org}
app.mail.console-fallback=true
# Server-side secret for reversible password encryption (used to decrypt branch passwords for display)
app.crypto.secret=${APP_CRYPTO_SECRET:Ch@ngeTh1sS3cr3t!nPr0duct10n}

# Multipart file upload configuration
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB


