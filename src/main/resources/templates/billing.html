<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Billing - Staff</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body class="bg-light">

    <div th:replace="~{fragments/admin-navbar :: adminNav('billing')}"></div>

    <div th:replace="~{fragments/admin-branch-bar :: branchBar}"></div>

    <div class="container-fluid my-4 px-4">
        <h3 class="fw-bold mb-4"><i class="bi bi-receipt text-success me-2"></i>Billing & History</h3>

        <ul class="nav nav-tabs mb-4" id="billingTabs" role="tablist">
            <li class="nav-item" role="presentation">
                <button class="nav-link active fw-bold text-dark" id="pending-tab" data-bs-toggle="tab" data-bs-target="#pending" type="button" role="tab">
                    <i class="bi bi-hourglass-split text-warning me-1"></i> Pending Payments
                    <span class="badge bg-danger ms-1" th:text="${#lists.size(orders)}" th:if="${!#lists.isEmpty(orders)}"></span>
                </button>
            </li>
            <li class="nav-item" role="presentation">
                <button class="nav-link fw-bold text-dark" id="history-tab" data-bs-toggle="tab" data-bs-target="#history" type="button" role="tab">
                    <i class="bi bi-clock-history text-primary me-1"></i> Today's History
                </button>
            </li>
        </ul>

        <div class="tab-content" id="billingTabsContent">
            
            <div class="tab-pane fade show active" id="pending" role="tabpanel">
                <div class="row row-cols-1 row-cols-md-2 row-cols-xl-3 g-4">
                    <div class="col" th:each="order : ${orders}">
                        <div class="card h-100 shadow-sm border-0 border-top border-warning border-4">
                            <div class="card-header bg-white border-0 d-flex justify-content-between align-items-center pt-3">
                                <span class="fw-bold fs-5">Order #<span th:text="${order.id}"></span></span>
                                <span class="badge bg-light text-dark" th:text="${#temporals.format(order.orderTime, 'HH:mm')}"></span>
                            </div>
                            
                            <div class="card-body">
                                <ul class="list-group list-group-flush mb-3">
                                    <li class="list-group-item px-0 d-flex justify-content-between" th:each="item : ${order.items}">
                                        <span><span th:text="${item.quantity}" class="fw-bold me-2"></span> <span th:text="${item.name}"></span></span>
                                        <span class="text-muted">RM <span th:text="${#numbers.formatDecimal(item.price * item.quantity, 1, 2)}"></span></span>
                                    </li>
                                </ul>
                                <div class="d-flex justify-content-between align-items-center bg-light p-3 rounded mb-3">
                                    <span class="fw-bold text-secondary">Total Due</span>
                                    <span class="fs-4 fw-bold text-success">RM <span th:text="${#numbers.formatDecimal(order.totalAmount, 1, 2)}"></span></span>
                                </div>
                            </div>
                            
                            <div class="card-footer bg-white border-0 pb-3">
                                <div th:if="${order.status == 'UPFRONT_PAYMENT'}">
                                    <form th:action="@{/billing/sendToKitchen}" method="post">
                                        <input type="hidden" name="orderId" th:value="${order.id}">
                                        <button type="submit" class="btn w-100 btn-primary fw-bold shadow-sm py-2">
                                            Confirm Paid & Send to Kitchen <i class="bi bi-fire ms-1"></i>
                                        </button>
                                    </form>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div th:if="${#lists.isEmpty(orders)}" class="col-12 w-100 text-center py-5">
                        <i class="bi bi-check2-circle text-success" style="font-size: 4rem;"></i>
                        <h4 class="text-muted mt-3">All caught up!</h4>
                        <p class="text-secondary">No pending payments.</p>
                    </div>
                </div>
            </div>

            <div class="tab-pane fade" id="history" role="tabpanel">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <h5 class="mb-0 text-success fw-bold">Daily Revenue: RM <span th:text="${#numbers.formatDecimal(totalRevenue, 1, 2)}">0.00</span></h5>
                    <a href="/billing/export" class="btn btn-dark btn-sm fw-bold">
                        <i class="bi bi-download me-1"></i> Export CSV
                    </a>
                </div>

                <div class="card shadow-sm border-0">
                    <div class="card-body p-0">
                        <div class="table-responsive">
                            <table class="table table-hover table-striped mb-0">
                                <thead class="table-dark">
                                    <tr>
                                        <th>Order #</th>
                                        <th>Time</th>
                                        <th>Status</th>
                                        <th>Items</th>
                                        <th>Total (RM)</th>
                                        <th class="text-end">Actions</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr th:each="order : ${historyOrders}" th:classappend="${order.status == 'REFUNDED'} ? 'table-danger text-muted' : ''">
                                        <td class="fw-bold" th:text="${order.id}">1</td>
                                        <td th:text="${#temporals.format(order.orderTime, 'HH:mm')}">12:00</td>
                                        <td>
                                            <span th:if="${order.status == 'COMPLETED'}" class="badge bg-success">Completed</span>
                                            <span th:if="${order.status == 'KITCHEN'}" class="badge bg-warning text-dark">In Kitchen (Paid)</span>
                                            <span th:if="${order.status == 'REFUNDED'}" class="badge bg-danger">Refunded</span>
                                        </td>
                                        <td>
                                            <small th:each="item, iterStat : ${order.items}">
                                                <span th:text="${item.quantity + 'x ' + item.name}"></span><span th:if="${!iterStat.last}">, </span>
                                            </small>
                                        </td>
                                        <td class="fw-bold" th:text="${#numbers.formatDecimal(order.totalAmount, 1, 2)}">0.00</td>
                                        <td class="text-end">
                                            <button th:if="${order.status != 'REFUNDED'}" class="btn btn-sm btn-outline-danger fw-bold py-0" 
                                                    th:onclick="'openRefundModal(' + ${order.id} + ')'">
                                                Refund
                                            </button>
                                            <small th:if="${order.status == 'REFUNDED'}" class="text-danger fw-bold">
                                                <i class="bi bi-info-circle"></i> <span th:text="${order.staffNote}">Reason</span>
                                            </small>
                                        </td>
                                    </tr>
                                    <tr th:if="${#lists.isEmpty(historyOrders)}">
                                        <td colspan="6" class="text-center text-muted py-4">No paid orders yet today.</td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <div class="modal fade" id="refundModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <form action="/billing/refund" method="post" class="modal-content border-0 shadow">
                <div class="modal-header bg-danger text-white">
                    <h5 class="modal-title fw-bold">Issue Refund</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body p-4">
                    <p class="text-secondary mb-3">Refunding Order #<span id="refundOrderIdDisplay" class="fw-bold text-dark"></span>.</p>
                    <input type="hidden" id="refundOrderIdInput" name="orderId">
                    <label class="form-label fw-bold">Reason for Refund:</label>
                    <input type="text" name="staffNote" class="form-control" placeholder="e.g., Customer changed mind..." required>
                </div>
                <div class="modal-footer bg-light border-0">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="submit" class="btn btn-danger fw-bold">Confirm Refund</button>
                </div>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function openRefundModal(orderId) {
            document.getElementById('refundOrderIdDisplay').innerText = orderId;
            document.getElementById('refundOrderIdInput').value = orderId;
            new bootstrap.Modal(document.getElementById('refundModal')).show();
        }

        // Optional: Keep the user on the History tab if they just did a refund
        if(window.location.hash === '#history') {
            var triggerEl = document.querySelector('#history-tab')
            bootstrap.Tab.getInstance(triggerEl) || new bootstrap.Tab(triggerEl).show()
        }
    </script>
</body>
</html>
