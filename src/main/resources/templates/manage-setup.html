<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Branch Setup - Manager Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body class="bg-light">

    <nav class="navbar navbar-dark bg-primary shadow-sm">
        <div class="container">
            <span class="navbar-brand fw-bold"><i class="bi bi-building me-2"></i>Branch Setup</span>
            <a th:if="${branchesConfigured > 0}" href="/staff" class="btn btn-outline-light btn-sm">Go to Menu</a>
        </div>
    </nav>

    <div class="container my-5">
        <div class="row justify-content-center">
            <div class="col-12 col-md-8 col-lg-6">
                <div class="card shadow-sm border-0">
                    <div class="card-body p-4">
                        <h4 class="fw-bold mb-1">Configure Branch <span th:text="${branchNumber}">1</span></h4>
                        <p class="text-muted small mb-4">
                            Organization: <strong th:text="${organizationName}">Org</strong>
                            &mdash;
                            <span th:text="${branchesConfigured}">0</span> of <span th:text="${branchLimit}">1</span> branches configured
                        </p>

                        <div th:if="${success}" class="alert alert-success py-2" th:text="${success}"></div>
                        <div th:if="${error}" class="alert alert-danger py-2" th:text="${error}"></div>

                        <p class="small text-secondary mb-3">
                            Enter details for this premise. Staff at this branch can log in later using the branch name and password you set here.
                        </p>

                        <form action="/manage/setup" method="post">
                            <div class="mb-3">
                                <label class="form-label fw-bold small">Branch Name</label>
                                <input type="text" class="form-control" name="branchName" required placeholder="e.g. Downtown">
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-bold small">Location</label>
                                <input type="text" class="form-control" name="location" required placeholder="Address or area">
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-bold small">Number of Tables</label>
                                <input type="number" class="form-control" name="tableCount" min="1" max="500" value="10" required>
                            </div>
                            <div class="mb-4">
                                <label class="form-label fw-bold small">Branch Password</label>
                                <input type="password" class="form-control" name="password" required minlength="4"
                                       placeholder="Used for branch-level login">
                            </div>
                            <button type="submit" class="btn btn-primary w-100 fw-bold">
                                <i class="bi bi-check-circle me-1"></i> Save Branch
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
