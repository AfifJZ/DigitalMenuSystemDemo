<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        body { min-height: 100vh; background: linear-gradient(135deg, #0d6efd 0%, #6610f2 100%); }
        .auth-card { max-width: 480px; border: none; border-radius: 1rem; }
    </style>
</head>
<body class="d-flex align-items-center justify-content-center py-5">

    <div class="card auth-card shadow-lg w-100 mx-3">
        <div class="card-body p-4 p-md-5">
            <div class="text-center mb-4">
                <i class="bi bi-key text-primary" style="font-size: 2.5rem;"></i>
                <h3 class="fw-bold mt-2 mb-1">Forgot password</h3>
                <p class="text-muted small mb-0">Verify your account with the registered organization email</p>
            </div>

            <div th:if="${error}" class="alert alert-danger py-2" th:text="${error}"></div>

            <form action="/manage/forgot-password" method="post">
                <div class="mb-3">
                    <label class="form-label fw-bold small">Reset password for</label>
                    <select class="form-select" name="resetType" id="resetType" onchange="updateForgotFields()">
                        <option value="organization" th:selected="${resetType == null or resetType != 'branch'}">Organization (general manager)</option>
                        <option value="branch" th:selected="${resetType == 'branch'}">Branch manager</option>
                    </select>
                </div>

                <div class="mb-3" id="orgNameField">
                    <label class="form-label fw-bold small">Organization name</label>
                    <input type="text" class="form-control" name="organizationName" id="organizationName"
                           th:value="${organizationName}" placeholder="Your organization">
                </div>

                <div class="mb-3 d-none" id="branchNameField">
                    <label class="form-label fw-bold small">Branch name</label>
                    <input type="text" class="form-control" name="branchName" id="branchName"
                           th:value="${branchName}" placeholder="Branch name">
                </div>

                <div class="mb-3">
                    <label class="form-label fw-bold small">Registered organization email</label>
                    <input type="email" class="form-control" name="email" th:value="${email}" required>
                    <div class="form-text">Must match the email used when the organization was registered.</div>
                </div>

                <button type="submit" class="btn btn-primary w-100 fw-bold mb-2">Continue</button>
                <a href="/manage/login" class="btn btn-link w-100">Back to sign in</a>
            </form>
        </div>
    </div>

    <script>
        function updateForgotFields() {
            const isBranch = document.getElementById('resetType').value === 'branch';
            document.getElementById('branchNameField').classList.toggle('d-none', !isBranch);
            document.getElementById('organizationName').required = true;
            document.getElementById('branchName').required = isBranch;
        }
        updateForgotFields();
    </script>
</body>
</html>
