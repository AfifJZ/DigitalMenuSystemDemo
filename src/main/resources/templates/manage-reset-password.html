<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        body { min-height: 100vh; background: linear-gradient(135deg, #0d6efd 0%, #6610f2 100%); }
        .auth-card { max-width: 480px; border: none; border-radius: 1rem; }
    </style>
</head>
<body class="d-flex align-items-center justify-content-center py-5">

    <div class="card auth-card shadow-lg w-100 mx-3">
        <div class="card-body p-4 p-md-5">
            <div class="text-center mb-4">
                <i class="bi bi-shield-check text-success" style="font-size: 2.5rem;"></i>
                <h3 class="fw-bold mt-2 mb-1">Set new password</h3>
                <p class="text-muted small mb-0">
                    <span th:text="${resetContext.targetType.name() == 'ORGANIZATION'} ? 'Organization' : 'Branch'">Type</span>:
                    <strong th:text="${resetContext.displayName}">Account</strong>
                </p>
            </div>

            <div th:if="${error}" class="alert alert-danger py-2" th:text="${error}"></div>

            <form action="/manage/reset-password" method="post" id="resetForm">
                <div class="mb-3">
                    <label class="form-label fw-bold small">New password</label>
                    <input type="password" class="form-control" name="newPassword" id="newPassword" required minlength="4" autocomplete="new-password">
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold small">Confirm new password</label>
                    <input type="password" class="form-control" name="confirmPassword" id="confirmPassword" required minlength="4" autocomplete="new-password">
                </div>
                <button type="submit" class="btn btn-success w-100 fw-bold">Update password</button>
            </form>
        </div>
    </div>

    <script>
        document.getElementById('resetForm').addEventListener('submit', function (e) {
            if (document.getElementById('newPassword').value !== document.getElementById('confirmPassword').value) {
                e.preventDefault();
                alert('Passwords do not match.');
            }
        });
    </script>
</body>
</html>
