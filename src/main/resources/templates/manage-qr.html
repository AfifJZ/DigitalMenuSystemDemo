<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table QR Codes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        @media print {
            .no-print { display: none !important; }
            .qr-card { break-inside: avoid; page-break-inside: avoid; }
        }
        .qr-card img { width: 180px; height: 180px; }
    </style>
</head>
<body class="bg-light">

    <nav class="navbar navbar-dark bg-primary shadow-sm no-print">
        <div class="container-fluid">
            <span class="navbar-brand fw-bold"><i class="bi bi-qr-code me-2"></i>Table QR Codes</span>
            <div class="d-flex gap-2">
                <button type="button" class="btn btn-outline-light btn-sm" onclick="window.print()">
                    <i class="bi bi-printer me-1"></i>Print
                </button>
                <a href="/manage/setup" class="btn btn-outline-light btn-sm" th:if="${canAddBranch}">Add Branch</a>
                <a href="/staff" class="btn btn-light btn-sm fw-bold">Menu</a>
            </div>
        </div>
    </nav>

    <div class="container my-4">
        <div class="text-center mb-4">
            <h3 class="fw-bold mb-1" th:text="${branch.name}">Branch</h3>
            <p class="text-muted mb-0" th:text="${branch.location}">Location</p>
            <p class="small text-secondary mt-2">
                Scan each QR code to open the menu for that table (Tables 1–<span th:text="${tableCount}">10</span>).
            </p>
        </div>

        <div class="row row-cols-2 row-cols-sm-3 row-cols-md-4 row-cols-lg-5 g-4 justify-content-center">
            <div class="col qr-card" th:each="t : ${#numbers.sequence(1, tableCount)}">
                <div class="card shadow-sm border-0 h-100 text-center">
                    <div class="card-body p-3">
                        <h5 class="fw-bold text-primary mb-3">Table <span th:text="${t}">1</span></h5>
                        <img th:src="@{/manage/qr/{branchId}/image(branchId=${branch.id}, table=${t})}"
                             th:alt="'QR code for table ' + ${t}"
                             class="img-fluid border rounded">
                        <p class="small text-muted mt-2 mb-0 text-break"
                           th:text="${customerUrls[t - 1]}">URL</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
