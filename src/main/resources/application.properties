spring.application.name=menumanager
# Server Configuration
server.port=8080

# XAMPP MySQL Database Connection
spring.datasource.url=jdbc:mysql://localhost:3306/digital_menu_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Hibernate/JPA Configuration
# 'update' automatically updates the DB schema if you add new fields to your entities
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

